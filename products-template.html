<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{CATEGORY_NAME}} - Yiwu Shuihui Import & Export</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        .header-content { display: flex; align-items: center; gap: 1rem; }
        .logo { height: 50px; width: auto; border-radius: 4px; }

        /* Navigation */
        nav { background: #34495e; padding: 0.5rem 0; position: sticky; top: 0; z-index: 100; }
        nav ul { list-style: none; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; }
        nav a { color: white; text-decoration: none; padding: 0.5rem 0; font-size: 0.9rem; transition: color 0.3s; }
        nav a:hover { color: #3498db; }
        nav a.active { color: #3498db; font-weight: 600; }
        
        /* Category Sub-nav */
        .category-nav { background: #ecf0f1; padding: 1rem 0; border-bottom: 1px solid #ddd; }
        .category-nav ul { list-style: none; display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .category-nav a { color: #2c3e50; text-decoration: none; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; background: white; border: 1px solid #ddd; transition: all 0.3s; }
        .category-nav a:hover { background: #3498db; color: white; border-color: #3498db; }
        .category-nav a.active { background: #3498db; color: white; border-color: #3498db; }

        .stats-bar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1rem 2rem; border-radius: 8px; margin-bottom: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 1rem; text-align: center; }
